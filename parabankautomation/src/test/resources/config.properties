# ============================================================
# Global configuration for the ParaBank automation framework.
# Values here are read at runtime by ConfigReader.
# ============================================================

# Application under test
base.url=https://parabank.parasoft.com/parabank/register.htm
login.url=https://parabank.parasoft.com/parabank/index.htm

# Browser settings
browser=chrome
headless=false

# Timeouts (in seconds)
implicit.wait=60
explicit.wait=60
page.load.timeout=60

# Reporting / artifacts
screenshot.path=test-output/screenshots/
extent.report.path=test-output/ExtentReport.html